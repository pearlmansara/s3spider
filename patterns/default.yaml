patterns:
  - name: AWS Access Key ID
    regex: '(?<![A-Z0-9])(AKIA|AIPA|ASIA|AROA)[A-Z0-9]{16}(?![A-Z0-9])'
    severity: critical

  - name: AWS Secret Access Key
    regex: '(?i)aws.{0,20}secret.{0,20}[''"]?([A-Za-z0-9/+=]{40})[''"]?'
    severity: critical

  - name: AWS Session Token
    regex: '(?i)(aws_session_token|aws_security_token)\s*[=:]\s*[''"]?([A-Za-z0-9/+=]{100,})[''"]?'
    severity: critical

  - name: Generic API Key / Token
    regex: '(?i)(api[_\-]?key|apikey|api[_\-]?token|access[_\-]?token|auth[_\-]?token|secret[_\-]?key|client[_\-]?secret)\s*[=:]\s*[''"]?([A-Za-z0-9\-_./+=]{16,})[''"]?'
    severity: high

  - name: Bearer Token
    regex: '(?i)bearer\s+[A-Za-z0-9\-_=]+\.[A-Za-z0-9\-_=]+\.?[A-Za-z0-9\-_.+/=]*'
    severity: high

  - name: Password in Config
    regex: '(?i)(password|passwd|pwd|pass)\s*[=:]\s*[''"]?([^\s''"]{6,})[''"]?'
    severity: high

  - name: Database Connection String
    regex: '(?i)(mysql|postgresql|postgres|mongodb|mssql|oracle|redis|jdbc|odbc):\/\/[^\s''"]+'
    severity: critical

  - name: RSA / PEM Private Key
    regex: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    severity: critical

  - name: SSH Private Key
    regex: '-----BEGIN OPENSSH PRIVATE KEY-----'
    severity: critical

  - name: PGP Private Key
    regex: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
    severity: critical

  - name: Generic Secret
    regex: '(?i)(secret|token|credential)\s*[=:]\s*[''"]?([A-Za-z0-9\-_./+=]{12,})[''"]?'
    severity: medium

  - name: Credit Card Number
    regex: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|6(?:011|5[0-9]{2})[0-9]{12})\b'
    severity: critical

  - name: Social Security Number (SSN)
    regex: '\b(?!000|666|9\d{2})\d{3}-(?!00)\d{2}-(?!0000)\d{4}\b'
    severity: critical

  - name: Email Address
    regex: '\b[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}\b'
    severity: low

  - name: IP Address (Private Range)
    regex: '\b(10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})\b'
    severity: low

  - name: Slack Token
    regex: 'xox[baprs]-[0-9A-Za-z\-]{10,}'
    severity: high

  - name: GitHub Token
    regex: 'ghp_[A-Za-z0-9]{36}|github[_\-]?token\s*[=:]\s*[''"]?[A-Za-z0-9_\-]{40}[''"]?'
    severity: high

  - name: Google API Key
    regex: 'AIza[0-9A-Za-z\-_]{35}'
    severity: high

  - name: Stripe Secret Key
    regex: 'sk_(live|test)_[0-9a-zA-Z]{24,}'
    severity: critical

  - name: Twilio Account SID / Auth Token
    regex: '(?i)(TWILIO|twilio).{0,30}(AC[a-z0-9]{32}|SK[a-z0-9]{32})'
    severity: high

  - name: .env File Pattern
    regex: '(?im)^[A-Z_]+=.+$'
    severity: medium

  - name: Hardcoded Username
    regex: '(?i)(username|user|login|uname)\s*[=:]\s*[''"]?([^\s''"]{3,})[''"]?'
    severity: low

  - name: Terraform State - Sensitive Value
    regex: '"value":\s*"(?!null)[^"]{6,}"'
    severity: high

  - name: Terraform State - Password Attribute
    regex: '"(?:password|passwd|secret|token|api_key|access_key|secret_key|private_key|auth_token|client_secret)":\s*"(?!null|"")[^"]{4,}"'
    severity: critical

  - name: Terraform State - AWS Provider Credentials
    regex: '"(?:access_key|secret_key)":\s*"[A-Za-z0-9/+=]{16,}"'
    severity: critical

  - name: Terraform State - Connection String
    regex: '"(?:connection_string|conn_string|database_url|db_url|jdbc_url)":\s*"[^"]+"'
    severity: critical

  - name: Terraform - Variable with Sensitive Marker
    regex: '(?i)sensitive\s*=\s*true'
    severity: medium
